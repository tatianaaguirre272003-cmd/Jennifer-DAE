<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Explore Digital Lake</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <header>
    <h1>Explore the Digital Lake</h1>
  </header>

  <nav>
    <a href="index.html">Back to Home</a>
  </nav>

  <main>

    <div class="explore-section">
      <img src="images/frame4.png"
           alt="Explore the Digital Lake Screen"
           width="400" loading="lazy">
    </div>

    <p class="info" title="Project description">
      This screen allows users to begin their exploration of the digital lake
      and interact with the environment.
    </p>

    <!-- INTERACTIVE SECTION -->
    <section>
      <h2 id="lakeStatus">Loading...</h2>
      <button onclick="updateLake()">Update Lake</button>
      <button onclick="startSimulation()">Start Simulation</button>
      <button onclick="makeItRain()">Make It Rain</button>
    </section>

    <!-- Container para peces -->
    <div id="fishContainer"></div>

    <!-- Barra de Ecosystem Health -->
    <div style="width: 300px; background: gray; margin-top: 10px;">
      <div id="healthBar" style="height: 20px; width: 50%; background: green;"></div>
    </div>

    <!-- Sonido de agua -->
    <audio id="waterSound" src="water.mp3"></audio>

  </main>

  <footer>
    <p>Digital Lake © 2026</p>
  </footer>

  <!-- Script JS compartido con index.html -->
  <script src="script.js"></script>

</body>
</html>
