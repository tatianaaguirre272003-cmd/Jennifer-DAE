<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Digital Lake</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Fondo, luna, estrellas, lluvia y fogata -->
  <div id="stars"></div>
  <div id="moon">🌙</div>
  <div id="rain"></div>
  <div id="fire" onclick="toggleFire()">🔥</div>

  <header>
    <h1 id="lakeTitle" class="mainTitle">Digital Lake</h1>
    <p>An Interactive Digital Ecosystem</p>
  </header>

  <!-- Botones de control -->
  <nav>
    <button onclick="toggleHealth()">💖 Health</button>
    <button onclick="toggleDayNight()">🌞/🌙 Day & Night</button>
    <button onclick="toggleRain()">🌧️ Rain/Storm</button>
    <button onclick="toggleFire()">🔥 Fire</button>
    <a href="explore.html">Explore the Digital Lake</a>
  </nav>

  <main>
    <!-- Contenedor del lago y animaciones -->
    <div id="lake">
      <img src="images/fisherman.png" id="fisherman" alt="Fisherman">
      <div id="fishContainer"></div>
      <div id="animalsContainer"></div>
    </div>

    <!-- Estado del lago -->
    <section>
      <h2 id="lakeStatus">Loading...</h2>
      <button onclick="updateLake()">Update Lake</button>
      <button onclick="startSimulation()">Start Simulation</button>
    </section>

    <!-- Barra de salud -->
    <div style="width: 300px; background: gray; margin-top: 10px;">
      <div id="healthBar" style="height: 20px; width: 50%; background: green;"></div>
    </div>

    <!-- Sonidos -->
    <audio id="waterSound" src="water.mp3" preload="auto" loop></audio>
    <audio id="rainSound" src="rain.mp3" preload="auto" loop></audio>
    <audio id="fireSound" src="fire.mp3" preload="auto" loop></audio>

  </main>

  <footer>
    <p>Created by Jennifer | Digital Lake Project</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
