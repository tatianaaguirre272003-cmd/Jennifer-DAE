<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Lake - Explore</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- Fondo lago y lluvia -->
<div id="lakeContainer">
  <img src="images/frame1.png" id="lakeFrame" class="lake-background">
  
  <!-- Animales pequeños -->
  <img src="images/fish.png" class="animal" id="fish">
  <img src="images/deer.png" class="animal" id="deer">
  <img src="images/turtle.png" class="animal" id="turtle">

  <div id="rain"></div>
</div>

<div class="controls">
  <button onclick="addFish()">Add Fish</button>
  <button onclick="toggleDayNight()">🌞/🌙 Day & Night</button>
  <button onclick="toggleRain()">🌧️ Rain/Storm</button>
  <button onclick="speedUp()">⚡ Speed</button>
  <button onclick="changeTemperature()">🌡️ Temperature</button>
  <a href="index.html">Back to Work Page</a>
</div>

<script src="script.js"></script>
</body>
</html>
